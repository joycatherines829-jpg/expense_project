<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 420px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        button:hover {
            background: #5a67d8;
        }

        .expense {
            background: #f4f4f4;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions a {
            margin-left: 8px;
            text-decoration: none;
        }

        .total {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 Expense Tracker</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Expense name" required>
        <input type="number" name="amount" placeholder="Amount" required>
        <button type="submit">Add Expense</button>
    </form>

    {% for expense in expenses %}
    <div class="expense">
        <div>
            {{ expense.title }} - ₹{{ expense.amount }}
        </div>
        <div class="actions">
            <a href="{% url 'edit' expense.id %}">✏</a>
            <a href="{% url 'delete' expense.id %}">❌</a>
        </div>
    </div>
    {% endfor %}

    <div class="total">
        Total: ₹{{ total }}
    </div>
</div>

</body>
</html>
